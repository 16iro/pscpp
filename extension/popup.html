<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      width: 280px;
      padding: 16px;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    #status { font-size: 13px; color: #a6adc8; margin-bottom: 12px; }
    #info { display: none; }
    .row { margin-bottom: 6px; font-size: 13px; }
    .label { color: #a6adc8; margin-right: 6px; }
    .tier { font-weight: bold; }
    .tags { font-size: 12px; color: #89b4fa; }

    /* 초기화 토글 */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #181825;
      font-size: 12px;
      color: #a6adc8;
    }
    .toggle-row.active { color: #f38ba8; }
    .switch { position: relative; width: 32px; height: 18px; }
    .switch input { display: none; }
    .slider {
      position: absolute; inset: 0;
      background: #45475a; border-radius: 18px; cursor: pointer;
      transition: background .2s;
    }
    .slider::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; left: 3px; top: 3px;
      background: #cdd6f4; border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: #f38ba8; }
    .switch input:checked + .slider::before { transform: translateX(14px); }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background .15s;
    }
    button.reset-mode { background: #f38ba8; }
    button:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }
    #result { margin-top: 10px; font-size: 12px; min-height: 16px; }
    .ok  { color: #a6e3a1; }
    .err { color: #f38ba8; }
  </style>
</head>
<body>
  <div id="status">BOJ 문제 페이지를 열어주세요.</div>
  <div id="info">
    <div class="row"><span class="label">문제</span><span id="prob-id"></span> — <span id="prob-title"></span></div>
    <div class="row"><span class="label">티어</span><span id="prob-tier" class="tier"></span></div>
    <div class="row"><span class="label">태그</span><span id="prob-tags" class="tags"></span></div>
    <div class="row"><span class="label">예제</span><span id="prob-samples"></span></div>

    <div class="toggle-row" id="toggle-row">
      <span id="toggle-label">초기화 (main.cpp · README 재생성)</span>
      <label class="switch">
        <input type="checkbox" id="reset-toggle" />
        <span class="slider"></span>
      </label>
    </div>

    <button id="btn">폴더 생성 / 예제 갱신</button>
    <div id="result"></div>
  </div>
  <script src="lib/browser.js"></script>
  <script src="popup.js"></script>
</body>
</html>
